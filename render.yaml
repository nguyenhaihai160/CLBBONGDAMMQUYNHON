services:
  - type: web
    name: football-academy-manager-pro
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 20.20.0
      - key: NODE_ENV
        value: production
      - key: FRONTEND_DIST_PATH
        value: /opt/render/project/src/frontend/dist
      - key: DATABASE_URL
        fromDatabase:
          name: football-academy-manager-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: ADMIN_PHONE
        sync: false
      - key: BANK_BIN
        value: "970436"
      - key: BANK_ACCOUNT
        sync: false
      - key: BANK_ACCOUNT_NAME
        sync: false
      - key: ZALO_OA_ID
        sync: false
      - key: ZALO_ACCESS_TOKEN
        sync: false

databases:
  - name: football-academy-manager-db
    region: singapore
    plan: free
    postgresMajorVersion: "16"
    databaseName: football_academy
    user: football_user
    ipAllowList: []
