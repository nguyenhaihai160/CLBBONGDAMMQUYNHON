<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đang offline</title>
    <style>
      body { margin:0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:#020617; color:white; display:grid; min-height:100vh; place-items:center; padding:24px; }
      .box { max-width:420px; border-radius:28px; padding:28px; background:rgba(15,23,42,.92); box-shadow:0 24px 80px rgba(0,0,0,.35); text-align:center; }
      .icon { width:76px; height:76px; margin:0 auto 16px; border-radius:24px; display:grid; place-items:center; background:#16a34a; font-size:36px; }
      h1 { margin:0 0 8px; font-size:24px; }
      p { margin:0; color:#cbd5e1; line-height:1.55; }
      button { margin-top:18px; border:0; border-radius:16px; padding:12px 16px; font-weight:800; background:#22c55e; color:#052e16; }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="icon">⚽</div>
      <h1>Thiết bị đang mất mạng</h1>
      <p>Ứng dụng đã được cài như app. Một số màn hình cần Internet hoặc kết nối tới máy chủ nội bộ để đồng bộ dữ liệu.</p>
      <button onclick="location.reload()">Thử kết nối lại</button>
    </div>
  </body>
</html>
